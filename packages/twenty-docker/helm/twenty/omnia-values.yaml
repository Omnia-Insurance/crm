server:
  replicaCount: 2
  # OMNIA-CUSTOM: Pod Identity Association maps this SA to the runtime IAM role
  # for Bedrock, Amazon Transcribe, Amazon Translate, and S3 QA artifacts under AWS BAA (HIPAA).
  serviceAccountName: twenty-bedrock
  persistence:
    enabled: false
  dockerDataPersistence:
    enabled: false
  image:
    repository: 189365142140.dkr.ecr.us-east-1.amazonaws.com/twenty-crm
    tag: latest
  env:
    NODE_OPTIONS: "--max-old-space-size=1536"
  extraEnv:
    - name: LOGIC_FUNCTION_TYPE
      value: LOCAL
    - name: CONVOSO_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: convoso-credentials
          key: apiToken
    - name: DEEPGRAM_API_KEY
      valueFrom:
        secretKeyRef:
          name: deepgram-credentials
          key: apiKey
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 1500m
      memory: 2560Mi
  ingress:
    enabled: true
    className: nginx
    acme: false
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
      nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
      nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
      nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "10"
      nginx.ingress.kubernetes.io/proxy-body-size: "10m"
      nginx.ingress.kubernetes.io/configuration-snippet: |
        # OMNIA-CUSTOM: Do not mark missing chunks/images as immutable. If a
        # stale tab requests an old hashed asset during a rolling deploy, the
        # 404 must not become a cacheable edge response.
        if ($request_uri ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$) {
          add_header Cache-Control "public, max-age=31536000, immutable";
        }
        if ($request_uri !~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico|json|map|wasm)$) {
          add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }
    hosts:
      - host: crm.omniaagent.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: twenty-tls
        hosts:
          - crm.omniaagent.com

worker:
  replicaCount: 2
  serviceAccountName: twenty-bedrock
  image:
    repository: 189365142140.dkr.ecr.us-east-1.amazonaws.com/twenty-crm
    tag: latest
  extraEnv:
    - name: LOGIC_FUNCTION_TYPE
      value: LOCAL
    - name: CONVOSO_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: convoso-credentials
          key: apiToken
    - name: DEEPGRAM_API_KEY
      valueFrom:
        secretKeyRef:
          name: deepgram-credentials
          key: apiKey
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 2048Mi

db:
  enabled: false
  external:
    host: twenty-crm-db.cluster-cgx4wwy00vhj.us-east-1.rds.amazonaws.com
    port: 5432
    user: twenty_app_user
    database: twenty
    ssl: false
    secretName: twenty-rds-credentials
    passwordKey: password

storage:
  type: s3
  s3:
    bucket: twenty-crm-storage-189365142140
    region: us-east-1
    secretName: twenty-s3-credentials
    accessKeyIdKey: accessKeyId
    secretAccessKeyKey: secretAccessKey

redisInternal:
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

nodeSelector:
  environment: production
tolerations:
  - key: "environment"
    operator: "Equal"
    value: "production"
    effect: "NoSchedule"
